<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Fetch</title>
    <link rel="preconnect" href="https://use.typekit.net" crossorigin>
    <link rel="preconnect" href="https://p.typekit.net" crossorigin>
    <link rel="stylesheet" href="https://use.typekit.net/kuk2ziw.css">
    <link rel="preload" as="image" href="assets/field.png">
    <link rel="preload" as="image" href="assets/tennisball.png">
    <meta name="theme-color" content="#3d7ab8">
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            min-height: 100%;
            cursor: pointer;
            position: relative;
            background: #3d7ab8 url("assets/field.png") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
        }

        .site-header {
            position: relative;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35em;
            padding: 0.65rem 1rem 0.5rem;
            pointer-events: none;
        }

        .site-title {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.4em;
            font-family: "omnes-pro", "Segoe UI", system-ui, sans-serif;
            font-size: 2.25rem;
            font-weight: 700;
            font-style: normal;
            line-height: 1.1;
            letter-spacing: 0.02em;
            color: #fff;
            text-shadow:
                0 1px 0 rgba(0,0,0,0.25),
                0 0 20px rgba(0,0,0,0.35),
                0 0 1px #000;
        }

        .logo-ball {
            width: 2.2rem;
            height: 2.2rem;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
        }

        @media (min-width: 480px) {
            .site-title {
                font-size: 2.75rem;
            }
            .logo-ball {
                width: 2.6rem;
                height: 2.6rem;
            }
        }

        #stage {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .tile {
            position: absolute;
            pointer-events: auto;
            transform-origin: 50% 50%;
        }

        .tile img {
            display: block;
            width: 100%;
            height: auto;
            max-width: 100%;
            border-radius: 4px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.22);
            transition: filter 0.2s ease;
        }

        .tile img:hover {
            filter: grayscale(100%);
        }
    </style>
</head>

<body>
    <header class="site-header">
        <h1 class="site-title">
            <span>Fetch</span>
            <img class="logo-ball" src="assets/tennisball.png" width="48" height="48" alt="" fetchpriority="high" decoding="async">
        </h1>
    </header>

    <div id="stage" aria-hidden="true"></div>

    <script>
        var MAX_IMAGES = 20;
        var MARGIN = 6;
        var ROTATION_MIN = -18;
        var ROTATION_MAX = 18;
        var SKEW_X_MAX = 5;
        var SKEW_Y_MAX = 3;
        var imagePaths = [
            "images/2562284278685941358.jpg",
            "images/25FCEC1B-86DE-4294-9002-0A5034E66020.JPG",
            "images/3233443802319281149.jpg",
            "images/603B4A0D-8231-4B81-A725-E43CAAACA32A%202.jpg",
            "images/6718829032717906727.jpg",
            "images/6CE1C35E-C1F9-4DA9-9E04-581A4C41FBD0.JPG",
            "images/7512106564098660126.jpg",
            "images/924B3102-56C3-4B12-8D15-6F5104385426.JPG",
            "images/B68B226C-4C70-4E2B-B020-4BDE1A33CBF0.JPG",
            "images/DEB96A9D-1CF3-4A63-AF4F-DB62E48BC560.JPG",
            "images/EDCEEBCE-1672-49D6-8B33-867A69F5683B.JPG",
            "images/IMG_0128.JPG",
            "images/IMG_0291.JPG",
            "images/IMG_0307.JPG",
            "images/IMG_0370.JPG",
            "images/IMG_0405.JPG",
            "images/IMG_0447.JPG",
            "images/IMG_1771.JPG",
            "images/IMG_2384.JPG",
            "images/IMG_2475.JPG",
            "images/IMG_2528.JPG",
            "images/IMG_2531.JPG",
            "images/IMG_2578.JPG",
            "images/IMG_2591.JPG",
            "images/IMG_2614.JPG",
            "images/IMG_2898.JPG",
            "images/IMG_3381.JPG",
            "images/IMG_5342.JPG",
            "images/IMG_5525.JPG",
            "images/IMG_5666.JPG",
            "images/IMG_5675.JPG",
            "images/IMG_5677.JPG",
            "images/IMG_5687.JPG",
            "images/IMG_5696.JPG",
            "images/IMG_5702.JPG",
            "images/IMG_5703.JPG",
            "images/IMG_5760.JPG",
            "images/IMG_5787.JPG",
            "images/IMG_6431.PNG",
            "images/IMG_6672.JPG",
            "images/IMG_6678.JPG",
            "images/IMG_6687.JPG",
            "images/IMG_8263.JPG",
            "images/IMG_8265.JPG",
            "images/Resized_20250110_184414_1736552838240.jpeg",
            "images/Resized_20260213_175937.jpeg",
            "images/image000000%202.jpg"
        ];

        var tiles = [];
        var zCounter = 1;
        var stage = document.getElementById("stage");
        var header = document.querySelector(".site-header");

        function getTopMin() {
            return (header && header.offsetHeight) ? header.offsetHeight + MARGIN : 56;
        }

        function randomIndex() {
            return Math.floor(Math.random() * imagePaths.length);
        }

        function randomDropTransform() {
            var rot = ROTATION_MIN + Math.random() * (ROTATION_MAX - ROTATION_MIN);
            var skx = (Math.random() * 2 - 1) * SKEW_X_MAX;
            var sky = (Math.random() * 2 - 1) * SKEW_Y_MAX;
            return "rotate(" + rot + "deg) skew(" + skx + "deg, " + sky + "deg)";
        }

        function parsePx(val) {
            if (!val) return 0;
            var n = parseFloat(val);
            return isNaN(n) ? 0 : n;
        }

        function clampTileToViewport(el) {
            var topMin = getTopMin();
            var vw = window.innerWidth;
            var vh = window.innerHeight;
            var k;
            for (k = 0; k < 30; k++) {
                var r = el.getBoundingClientRect();
                var left = parsePx(el.style.left);
                var top = parsePx(el.style.top);
                var moved = false;
                if (r.left < MARGIN) {
                    el.style.left = (left + (MARGIN - r.left)) + "px";
                    moved = true;
                } else if (r.right > vw - MARGIN) {
                    el.style.left = (left + (vw - MARGIN - r.right)) + "px";
                    moved = true;
                } else if (r.top < topMin) {
                    el.style.top = (top + (topMin - r.top)) + "px";
                    moved = true;
                } else if (r.bottom > vh - MARGIN) {
                    el.style.top = (top + (vh - MARGIN - r.bottom)) + "px";
                    moved = true;
                }
                if (!moved) break;
            }
        }

        function placeTile(el, widthPx) {
            var pad = MARGIN;
            var topMin = getTopMin();
            var w = widthPx;
            w = Math.min(w, window.innerWidth - 2 * pad);
            if (w < 50) w = Math.min(50, window.innerWidth - 2 * pad);
            el.style.width = w + "px";
            var maxL = Math.max(0, window.innerWidth - w - 2 * pad);
            var estH = Math.min(480, w * 1.35);
            var maxT = Math.max(0, window.innerHeight - topMin - estH - pad);
            el.style.left = (pad + Math.random() * maxL) + "px";
            el.style.top = (topMin + pad + Math.random() * maxT) + "px";
        }

        function pickWidthPx() {
            var pad = MARGIN;
            var slack = 48;
            var maxW = Math.min(300, window.innerWidth - 2 * pad - slack);
            if (maxW < 80) {
                return Math.max(50, maxW);
            }
            return Math.floor(Math.random() * (maxW - 80 + 1) + 80);
        }

        function add_image() {
            var new_wrap = document.createElement("div");
            new_wrap.className = "tile";
            new_wrap.style.transform = randomDropTransform();

            var img = document.createElement("img");
            var src = imagePaths[randomIndex()];
            img.src = src;
            img.alt = "Dog photo";
            img.decoding = "async";
            img.fetchPriority = "high";
            new_wrap.appendChild(img);

            var widthPx = pickWidthPx();
            new_wrap.style.zIndex = String(++zCounter);
            placeTile(new_wrap, widthPx);

            function onImgReady() {
                if (!new_wrap.parentNode) return;
                clampTileToViewport(new_wrap);
            }

            if (img.complete && img.naturalWidth) {
                onImgReady();
            } else {
                img.addEventListener("load", onImgReady, { once: true });
                img.addEventListener("error", onImgReady, { once: true });
            }

            if (tiles.length >= MAX_IMAGES) {
                var removed = tiles.shift();
                if (removed && removed.parentNode) {
                    removed.remove();
                }
            }
            tiles.push(new_wrap);
            stage.appendChild(new_wrap);
            requestAnimationFrame(function () {
                clampTileToViewport(new_wrap);
            });
        }

        document.addEventListener("click", add_image);

        window.addEventListener("resize", function () {
            for (var i = 0; i < tiles.length; i++) {
                var t = tiles[i];
                var w = parseInt(t.style.width, 10) || 120;
                var cap = Math.min(300, window.innerWidth - 2 * MARGIN - 48);
                w = Math.min(w, cap);
                if (w < 50) w = Math.max(50, cap);
                t.style.width = w + "px";
                placeTile(t, w);
                clampTileToViewport(t);
            }
        });

        (function warmImageCache() {
            function batch(start) {
                var end = Math.min(start + 8, imagePaths.length);
                for (var p = start; p < end; p++) {
                    var pre = new Image();
                    pre.decoding = "async";
                    pre.src = imagePaths[p];
                }
                if (end < imagePaths.length) {
                    if (window.requestIdleCallback) {
                        requestIdleCallback(function () { batch(end); });
                    } else {
                        setTimeout(function () { batch(end); }, 32);
                    }
                }
            }
            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", function () { batch(0); });
            } else {
                setTimeout(function () { batch(0); }, 0);
            }
        }());
    </script>
</body>

</html>
