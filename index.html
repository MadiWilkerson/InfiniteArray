<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Fetch</title>
    <meta name="theme-color" content="#3d7ab8">
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            min-height: 100%;
            cursor: pointer;
            position: relative;
            background: #3d7ab8 url("assets/field.png") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
        }

        .site-header {
            position: relative;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35em;
            padding: 0.65rem 1rem 0.5rem;
            pointer-events: none;
        }

        .site-title {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.4em;
            font: 800 2.25rem/1.1 "Segoe UI", system-ui, sans-serif;
            letter-spacing: 0.02em;
            color: #fff;
            text-shadow:
                0 1px 0 rgba(0,0,0,0.25),
                0 0 20px rgba(0,0,0,0.35),
                0 0 1px #000;
        }

        .logo-ball {
            width: 2.2rem;
            height: 2.2rem;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
        }

        @media (min-width: 480px) {
            .site-title {
                font-size: 2.75rem;
            }
            .logo-ball {
                width: 2.6rem;
                height: 2.6rem;
            }
        }

        #stage {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .tile {
            position: absolute;
            pointer-events: auto;
        }

        .tile img {
            display: block;
            width: 100%;
            height: auto;
            max-width: 100%;
            border-radius: 6px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.25);
            transition: filter 0.2s ease;
        }

        .tile img:hover {
            filter: grayscale(100%);
        }
    </style>
</head>

<body>
    <header class="site-header">
        <h1 class="site-title">
            <img class="logo-ball" src="assets/tennisball.png" width="48" height="48" alt="">
            <span>Fetch</span>
        </h1>
    </header>

    <div id="stage" aria-hidden="true"></div>

    <script>
        var MAX_IMAGES = 20;
        var imagePaths = [
            "images/2562284278685941358.jpg",
            "images/25FCEC1B-86DE-4294-9002-0A5034E66020.JPG",
            "images/3233443802319281149.jpg",
            "images/603B4A0D-8231-4B81-A725-E43CAAACA32A%202.jpg",
            "images/6718829032717906727.jpg",
            "images/6CE1C35E-C1F9-4DA9-9E04-581A4C41FBD0.JPG",
            "images/7512106564098660126.jpg",
            "images/924B3102-56C3-4B12-8D15-6F5104385426.JPG",
            "images/B68B226C-4C70-4E2B-B020-4BDE1A33CBF0.JPG",
            "images/DEB96A9D-1CF3-4A63-AF4F-DB62E48BC560.JPG",
            "images/EDCEEBCE-1672-49D6-8B33-867A69F5683B.JPG",
            "images/IMG_0128.JPG",
            "images/IMG_0291.JPG",
            "images/IMG_0307.JPG",
            "images/IMG_0370.JPG",
            "images/IMG_0405.JPG",
            "images/IMG_0447.JPG",
            "images/IMG_1771.JPG",
            "images/IMG_2384.JPG",
            "images/IMG_2475.JPG",
            "images/IMG_2528.JPG",
            "images/IMG_2531.JPG",
            "images/IMG_2578.JPG",
            "images/IMG_2591.JPG",
            "images/IMG_2614.JPG",
            "images/IMG_2898.JPG",
            "images/IMG_3381.JPG",
            "images/IMG_5342.JPG",
            "images/IMG_5525.JPG",
            "images/IMG_5666.JPG",
            "images/IMG_5675.JPG",
            "images/IMG_5677.JPG",
            "images/IMG_5687.JPG",
            "images/IMG_5696.JPG",
            "images/IMG_5702.JPG",
            "images/IMG_5703.JPG",
            "images/IMG_5760.JPG",
            "images/IMG_5787.JPG",
            "images/IMG_6431.PNG",
            "images/IMG_6672.JPG",
            "images/IMG_6678.JPG",
            "images/IMG_6687.JPG",
            "images/IMG_8263.JPG",
            "images/IMG_8265.JPG",
            "images/Resized_20250110_184414_1736552838240.jpeg",
            "images/Resized_20260213_175937.jpeg",
            "images/image000000%202.jpg"
        ];

        var tiles = [];
        var zCounter = 1;
        var stage = document.getElementById("stage");
        var header = document.querySelector(".site-header");

        function randomIndex() {
            return Math.floor(Math.random() * imagePaths.length);
        }

        function placeTile(el, widthPx) {
            var w = widthPx;
            var pad = 8;
            var hBottom = 24;
            var topMin = (header && header.offsetHeight) ? header.offsetHeight + pad : 56;
            var maxL = Math.max(0, window.innerWidth - w - pad);
            var maxT = Math.max(0, window.innerHeight - hBottom - topMin);
            var left = pad + Math.random() * maxL;
            var top = topMin + Math.random() * maxT;
            el.style.left = left + "px";
            el.style.top = top + "px";
            el.style.width = w + "px";
        }

        function add_image() {
            var new_wrap = document.createElement("div");
            new_wrap.className = "tile";

            var img = document.createElement("img");
            img.src = imagePaths[randomIndex()];
            img.alt = "Dog photo";
            img.decoding = "async";
            new_wrap.appendChild(img);

            var widthPx = Math.floor(Math.random() * (300 - 100 + 1) + 100);
            new_wrap.style.zIndex = String(++zCounter);
            placeTile(new_wrap, widthPx);

            if (tiles.length >= MAX_IMAGES) {
                var removed = tiles.shift();
                if (removed && removed.parentNode) {
                    removed.remove();
                }
            }
            tiles.push(new_wrap);
            stage.appendChild(new_wrap);
        }

        document.addEventListener("click", add_image);

        window.addEventListener("resize", function () {
            for (var i = 0; i < tiles.length; i++) {
                var t = tiles[i];
                var w = parseInt(t.style.width, 10) || 120;
                placeTile(t, w);
            }
        });
    </script>
</body>

</html>
