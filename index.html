<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Enzo Mari redux</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #fafafa;
        }

        .credit {
            font: 12px/1.4 system-ui, sans-serif;
            color: #666;
            padding: 8px 12px;
        }

        .credit a {
            color: #333;
        }

        .tile {
            display: inline-block;
            vertical-align: top;
        }

        .tile img {
            display: block;
            width: 100%;
            height: auto;
            max-width: 100%;
            cursor: pointer;
        }

        .tile img:hover {
            filter: hue-rotate(90deg);
        }
    </style>
</head>

<body>
    <div class="credit">This website is based on the design of the <a href="https://enzomari.com/">Enzo Mari archive</a> by <a href="https://jon-l.com/">Jon Lucas</a>.</div>

    <script>
        // Your image batch (paths under ./images) — 47 files from your set

        ];

        function random_image() {
            return Math.floor(Math.random() * imagePaths.length);
        }

        function add_image() {
            var new_wrap = document.createElement("div");
            new_wrap.className = "tile";

            var img = document.createElement("img");
            img.src = imagePaths[random_image()];
            img.alt = "";
            img.decoding = "async";
            new_wrap.appendChild(img);

            var random_width = Math.floor(Math.random() * (300 - 100 + 1) + 100);
            new_wrap.style.width = random_width + "px";

            document.body.prepend(new_wrap);

            new_wrap.addEventListener("click", add_image);
        }

        add_image();
    </script>
</body>

</html>
